spring:
  application:
    name: chinese-cars
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chinese_cars_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  profiles:
    active: mvp
  flyway:
    enabled: true

rustfs:
  endpoint: ${RUSTFS_ENDPOINT:http://localhost:9000}
  access-key: ${RUSTFS_ACCESS_KEY:rustfsadmin}
  secret-key: ${RUSTFS_SECRET_KEY:rustfsadmin}
  bucket: car-images
  region: us-east-1

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.flywaydb: INFO
    me.paulschwarz.spring.dotenv: DEBUG
  file:
    name: application.log

external:
  url:
    Audi:
      base: https://www.audi.cn/zh/performanceequipment.
      models: https://www.audi.cn/zh/models.html
      models_specific_part: /zh/models

mymemory:
  email:
    use: ${MYMEMORY_EMAIL_USE:false}
    name: ${MYMEMORY_EMAIL_NAME:fake@gmail.com}
