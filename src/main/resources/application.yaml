spring:
  application:
    name: chinese-cars
  datasource:
    url: jdbc:postgresql://localhost:5432/chinese_cars_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  profiles:
    active: mvp
  flyway:
    enabled: true

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.flywaydb: INFO
    me.paulschwarz.spring.dotenv: DEBUG
  file:
    name: application.log

external:
  url:
    Audi:
      base: https://www.audi.cn/zh/performanceequipment.
      models: https://www.audi.cn/zh/models.html
      models_specific_part: /zh/models

mymemory:
  email:
    use: ${MYMEMORY_EMAIL_USE}
    name: ${MYMEMORY_EMAIL_NAME}
